version: '3.8'

services:
  app:
    build: .
    container_name: intelligent-document-automation
    ports:
      - "5000:5000"
    volumes:
      - ./input_pdfs:/app/input_pdfs
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
